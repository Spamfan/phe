<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project IRIS - Scanner</title>
    <!-- Import Tesseract.js v5 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #4CAF50;
        }
        #status {
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffeb3b;
        }
        .video-container {
            width: 100%;
            max-width: 500px;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
        }
        video {
            width: 100%;
            display: block;
        }
        textarea {
            width: 100%;
            max-width: 500px;
            height: 120px;
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.7;
        }
        #copyBtn {
            background-color: #2196F3;
            color: white;
        }
        #resumeBtn {
            background-color: #f44336;
            color: white;
        }
        /* Hidden canvas for grabbing video frames */
        #hiddenCanvas {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Project IRIS</h1>
    <div id="status">Initializing Camera & AI...</div>

    <div class="video-container">
        <!-- playsinline is critical for iOS Safari -->
        <video id="cameraFeed" autoplay playsinline></video>
    </div>

    <textarea id="output" placeholder="Scanned text will appear here..." readonly></textarea>

    <div class="controls">
        <button id="copyBtn">Copy to Clipboard</button>
        <button id="resumeBtn">Resume Scan</button>
    </div>

    <canvas id="hiddenCanvas"></canvas>

    <script>
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');
        const resumeBtn = document.getElementById('resumeBtn');

        let worker = null;
        let isScanning = false;

        async function initApp() {
            try {
                // 1. Request Camera (Rear camera preferred)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;

                // 2. Initialize Tesseract
                worker = await Tesseract.createWorker('eng');
                
                // 3. Start Scanning Loop
                startScanning();

            } catch (err) {
                console.error(err);
                statusEl.innerText = "Error: Camera access denied or unsupported.";
                statusEl.style.color = "#f44336";
            }
        }

        function startScanning() {
            isScanning = true;
            statusEl.innerText = "Scanning...";
            statusEl.style.color = "#ffeb3b";
            outputEl.value = "";
            scanFrame(); // Trigger the loop
        }

        async function scanFrame() {
            if (!isScanning) return;

            // Wait until video has dimensions
            if (video.videoWidth === 0) {
                setTimeout(scanFrame, 500);
                return;
            }

            // Copy current video frame to canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                // Pass the canvas to Tesseract for OCR
                const { data: { text } } = await worker.recognize(canvas);
                const cleanedText = text.trim();

                // If we found a reasonable amount of text, stop and display
                if (cleanedText.length > 5) {
                    completeScan(cleanedText);
                    return; // Break out of the loop
                }
            } catch (err) {
                console.error("OCR Error:", err);
            }

            // Loop again after a short delay to prevent freezing the browser
            if (isScanning) {
                setTimeout(scanFrame, 800);
            }
        }

        function completeScan(resultText) {
            isScanning = false;
            statusEl.innerText = "Complete!";
            statusEl.style.color = "#4CAF50";
            outputEl.value = resultText;
        }

        // Button Listeners
        copyBtn.addEventListener('click', async () => {
            if (!outputEl.value) return;
            try {
                await navigator.clipboard.writeText(outputEl.value);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = originalText, 2000);
            } catch (err) {
                alert("Failed to copy text. Please copy manually.");
            }
        });

        resumeBtn.addEventListener('click', () => {
            if (!isScanning) {
                startScanning();
            }
        });

        // Bootstrap the app
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
