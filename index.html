<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project IRIS - Scanner</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            height: 100vh;
            height: 100dvh; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        
        #versionLabel {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #666;
            font-size: 0.8rem;
            font-weight: bold;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 5px;
            color: #4CAF50;
            flex-shrink: 0;
        }
        
        #status {
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffeb3b;
            text-align: center;
            flex-shrink: 0;
            min-height: 1.2rem;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .pulsing {
            animation: pulse 1.5s infinite;
        }
        
        /* Viewfinder is now a perfect 1:1 Square */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1; 
            border: 3px solid #00ff00;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: all 0.2s ease-out;
        }

        /* Focus flash animation applies to the whole container now */
        .focus-flash {
            border-color: #ffffff !important;
            transform: scale(0.97);
        }
        
        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover; /* Perfectly center-crops the feed visually */
        }

        textarea {
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            min-height: 60px;
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 10px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            flex-shrink: 0;
        }
        
        button {
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button:active { opacity: 0.7; }
        button:disabled {
            background-color: #555 !important;
            color: #888 !important;
            cursor: not-allowed;
        }
        
        #scanBtn {
            grid-column: 1 / -1; 
            background-color: #4CAF50;
            color: white;
            font-size: 1.2rem;
            padding: 15px;
        }
        #clearBtn {
            background-color: #f44336;
            color: white;
        }
        #copyBtn {
            background-color: #2196F3;
            color: white;
            font-size: 1.2rem;
        }
        #toggleCamBtn {
            background-color: #333;
            color: #bbb;
            font-size: 1.2rem;
        }
        
        #hiddenCanvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="versionLabel">v0.6.1</div>
    <h1>Project IRIS</h1>
    <div id="status">Initializing Camera...</div>

    <div class="video-container" id="videoContainer">
        <video id="cameraFeed" autoplay playsinline></video>
    </div>

    <textarea id="output" placeholder="Scanned text will append here..." readonly></textarea>

    <div class="controls">
        <button id="scanBtn" disabled>Scan Target</button>
        <button id="clearBtn">Clear List</button>
        <button id="copyBtn">📄</button>
        <button id="toggleCamBtn">📷</button>
    </div>

    <canvas id="hiddenCanvas"></canvas>

    <script>
        // Inserted API Key
        const OCR_API_KEY = 'K83239282988957'; 

        const video = document.getElementById('cameraFeed');
        const videoContainer = document.getElementById('videoContainer');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const scanBtn = document.getElementById('scanBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toggleCamBtn = document.getElementById('toggleCamBtn');

        let currentStream = null;
        let isManuallyPaused = false;

        async function initApp() {
            try {
                await startCamera();
                statusEl.innerText = "Ready. Fill square with text and Scan.";
                statusEl.style.color = "#4CAF50";
                scanBtn.disabled = false;
            } catch (err) {
                console.error(err);
                statusEl.innerText = "Error: Initialization failed.";
                statusEl.style.color = "#f44336";
            }
        }

        async function startCamera() {
            if (currentStream) return;
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 4096 }, // Request max hardware resolution
                        height: { ideal: 2160 },
                        advanced: [{ focusMode: "continuous" }]
                    }
                });
                video.srcObject = currentStream;
            } catch (err) {
                console.error("Camera start error:", err);
                statusEl.innerText = "Error: Camera access denied.";
                statusEl.style.color = "#f44336";
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
                video.srcObject = null;
            }
        }

        // --- Lifecycle Events ---
        function handleVisibilityChange() {
            if (document.hidden) {
                stopCamera();
            } else {
                if (!isManuallyPaused) startCamera();
            }
        }
        document.addEventListener('visibilitychange', handleVisibilityChange);
        window.addEventListener('pagehide', stopCamera);
        window.addEventListener('pageshow', () => {
            if (!isManuallyPaused) startCamera();
        });

        toggleCamBtn.addEventListener('click', () => {
            if (currentStream) {
                stopCamera();
                isManuallyPaused = true;
                statusEl.innerText = "Camera Paused.";
                statusEl.style.color = "#ff9800";
            } else {
                isManuallyPaused = false;
                startCamera();
                statusEl.innerText = "Ready. Fill square with text and Scan.";
                statusEl.style.color = "#4CAF50";
            }
        });

        videoContainer.addEventListener('click', async () => {
            if (!currentStream) return;
            const track = currentStream.getVideoTracks()[0];
            const capabilities = track.getCapabilities ? track.getCapabilities() : {};
            
            // Visual Focus Flash
            videoContainer.classList.add('focus-flash');
            setTimeout(() => videoContainer.classList.remove('focus-flash'), 250);

            if (capabilities.focusMode) {
                try {
                    await track.applyConstraints({
                        advanced: [{ focusMode: "continuous" }]
                    });
                } catch (err) {
                    console.log("Manual focus constraint not supported on this device.");
                }
            }
        });

        // --- Core Scanning Logic (1:1 Center Crop & Upscale) ---
        scanBtn.addEventListener('click', async () => {
            if (!currentStream) return;

            scanBtn.disabled = true;
            statusEl.innerText = "📸 Snapshot taken! Analyzing...";
            statusEl.style.color = "#ffeb3b";
            statusEl.classList.add('pulsing');

            if (video.videoWidth === 0) {
                scanBtn.disabled = false;
                statusEl.classList.remove('pulsing');
                return;
            }

            // 1. Math: Find the exact center 1:1 square of the raw camera feed
            const size = Math.min(video.videoWidth, video.videoHeight);
            const startX = (video.videoWidth - size) / 2;
            const startY = (video.videoHeight - size) / 2;

            // 2. Crop to hidden canvas
            canvas.width = size;
            canvas.height = size;
            ctx.drawImage(
                video, 
                startX, startY, size, size, // Source (Raw Camera Feed)
                0, 0, size, size            // Destination (Canvas)
            );

            // 3. Base64 Conversion
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);

            // 4. API Payload (Engine 2 + Upscaling)
            const formData = new FormData();
            formData.append('apikey', OCR_API_KEY);
            formData.append('base64Image', base64Image);
            formData.append('OCREngine', '2');
            formData.append('scale', 'true'); // AI Upscaling activated

            // 5. Send Request
            try {
                const response = await fetch('https://api.ocr.space/parse/image', {
                    method: 'POST',
                    body: formData
                });
                
                const json = await response.json();
                statusEl.classList.remove('pulsing');

                if (json.IsErroredOnProcessing) {
                    console.error("API Error:", json.ErrorMessage);
                    statusEl.innerText = "API Error: " + (json.ErrorMessage[0] || "Unknown");
                    statusEl.style.color = "#f44336";
                } else if (json.ParsedResults && json.ParsedResults.length > 0) {
                    const cleanedText = json.ParsedResults[0].ParsedText.trim();

                    if (cleanedText) {
                        if (outputEl.value) {
                            outputEl.value += '\n' + cleanedText;
                        } else {
                            outputEl.value = cleanedText;
                        }
                        outputEl.scrollTop = outputEl.scrollHeight;
                        
                        statusEl.innerText = "Added to list!";
                        statusEl.style.color = "#4CAF50";
                    } else {
                        statusEl.innerText = "No text found.";
                        statusEl.style.color = "#ff9800";
                    }
                } else {
                    statusEl.innerText = "No text detected.";
                    statusEl.style.color = "#ff9800";
                }

            } catch (err) {
                console.error("Network Error:", err);
                statusEl.classList.remove('pulsing');
                statusEl.innerText = "Network Error. Check connection.";
                statusEl.style.color = "#f44336";
            }

            scanBtn.disabled = false;
            setTimeout(() => {
                if (statusEl.innerText === "Added to list!" || statusEl.innerText.includes("No text")) {
                    statusEl.innerText = "Ready. Fill square with text and Scan.";
                    statusEl.style.color = "#4CAF50";
                }
            }, 2500);
        });

        copyBtn.addEventListener('click', async () => {
            if (!outputEl.value) return;
            try {
                await navigator.clipboard.writeText(outputEl.value);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "✔️";
                setTimeout(() => copyBtn.innerText = originalText, 2000);
            } catch (err) {
                alert("Failed to copy text. Please copy manually.");
            }
        });

        clearBtn.addEventListener('click', () => {
            outputEl.value = "";
            statusEl.innerText = "List cleared. Ready.";
            statusEl.style.color = "#4CAF50";
        });

        window.addEventListener('load', initApp);
    </script>
</body>
</html>
